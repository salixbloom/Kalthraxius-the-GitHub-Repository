<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalthraxius</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d1117;
  --surface:     #161b22;
  --surface2:    #21262d;
  --border:      #30363d;
  --accent:      #58a6ff;
  --accent-dim:  #1f6feb;
  --text:        #e6edf3;
  --muted:       #8b949e;
  --green:       #3fb950;
  --yellow:      #d29922;
  --red:         #f85149;
  --purple:      #bc8cff;
  --orange:      #ffa657;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ── Header ─────────────────────────────────────────────────────────────── */

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-wrap: wrap;
}

.logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.4px;
  white-space: nowrap;
  color: var(--text);
}
.logo span { color: var(--accent); }

.url-row {
  display: flex;
  gap: 6px;
  flex: 1;
  min-width: 220px;
  max-width: 400px;
}

.url-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 10px;
  font-size: 12px;
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  outline: none;
}
.url-row input:focus { border-color: var(--accent); }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.status-dot.ok  { background: var(--green); }
.status-dot.err { background: var(--red); }

.stat-pills {
  display: flex;
  gap: 14px;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
}
.stat-pills strong { color: var(--text); }

/* ── Layout ─────────────────────────────────────────────────────────────── */

.layout {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── Sidebar ────────────────────────────────────────────────────────────── */

aside {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
}

input[type="text"],
input[type="number"],
select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 6px 9px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  width: 100%;
}
input:focus, select:focus { border-color: var(--accent); }
select option { background: var(--surface2); }

button {
  background: var(--accent-dim);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 7px 12px;
  font-size: 13px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: background 0.12s;
}
button:hover:not(:disabled) { background: var(--accent); }
button:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }

/* ── Main area ──────────────────────────────────────────────────────────── */

main {
  flex: 1;
  overflow-y: auto;
  padding: 18px 20px;
}

.results-header {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}

/* ── Job card ───────────────────────────────────────────────────────────── */

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card:hover {
  border-color: var(--accent-dim);
  background: var(--surface2);
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
}

.platform-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 5px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.card-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  align-items: center;
}
.sep { color: var(--border); margin: 0 1px; }
.salary { color: var(--green); font-weight: 500; }

.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  min-height: 0;
}

.pill {
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 500;
}

/* Seniority colours */
.s-intern, .s-junior   { background: #3fb95018; color: var(--green);  border: 1px solid #3fb95040; }
.s-mid                 { background: #d2992218; color: var(--yellow); border: 1px solid #d2992240; }
.s-senior, .s-staff    { background: #1f6feb28; color: var(--accent); border: 1px solid #1f6feb55; }
.s-principal, .s-lead  { background: #bc8cff18; color: var(--purple); border: 1px solid #bc8cff40; }
.s-manager, .s-director{ background: #ffa65718; color: var(--orange); border: 1px solid #ffa65740; }
.s-executive           { background: #f8514918; color: var(--red);    border: 1px solid #f8514940; }
.p-skill               { background: #bc8cff10; color: var(--purple); border: 1px solid #bc8cff30; }

/* ── Empty / loading ────────────────────────────────────────────────────── */

.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-size: 13px;
}

/* ── Modal ──────────────────────────────────────────────────────────────── */

dialog {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: 0;
  max-width: 760px;
  width: 92vw;
  max-height: 88vh;
  outline: none;
  overflow: hidden;
}
dialog::backdrop {
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(3px);
}

.modal-hdr {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 14px;
}

.modal-title   { font-size: 17px; font-weight: 700; }
.modal-company { font-size: 12px; color: var(--muted); margin-top: 3px; }

.modal-x {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 0;
  width: auto;
  line-height: 1;
  flex-shrink: 0;
}
.modal-x:hover { color: var(--text); background: none; }

.modal-body {
  padding: 18px 22px;
  overflow-y: auto;
  max-height: calc(88vh - 80px);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 12px;
  color: var(--muted);
  align-items: center;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  margin-bottom: 6px;
}

.desc-frame {
  width: 100%;
  min-height: 260px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface2);
  color-scheme: dark;
}

.modal-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 12px;
}
.modal-link:hover { text-decoration: underline; }

/* ── Scrollbars ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ <span>Kalthraxius</span></div>
  <div class="url-row">
    <input id="base-url" type="text" placeholder="http://localhost:3000" spellcheck="false">
    <button id="connect-btn" style="width:auto;padding:5px 12px;font-size:12px">Connect</button>
  </div>
  <div class="status-dot" id="status-dot" title="Disconnected"></div>
  <div class="stat-pills" id="stat-pills"></div>
</header>

<div class="layout">
  <aside>
    <div class="field">
      <label for="q-text">Search</label>
      <input id="q-text" type="text" placeholder="backend engineer Go…">
    </div>
    <div class="field">
      <label for="q-platform">Platform</label>
      <select id="q-platform">
        <option value="">All platforms</option>
      </select>
    </div>
    <div class="field">
      <label for="q-limit">Limit</label>
      <input id="q-limit" type="number" value="50" min="1" max="1000">
    </div>
    <button id="search-btn">Search</button>
    <button id="clear-btn" class="btn-ghost">Clear</button>
  </aside>

  <main id="main">
    <div class="empty">Connect to an aggregator to browse jobs.</div>
  </main>
</div>

<!-- Job detail modal -->
<dialog id="job-modal">
  <div class="modal-hdr">
    <div>
      <div class="modal-title"  id="m-title"></div>
      <div class="modal-company" id="m-company"></div>
    </div>
    <button class="modal-x" id="modal-close" aria-label="Close">✕</button>
  </div>
  <div class="modal-body">
    <div class="modal-meta" id="m-meta"></div>
    <div class="pills"      id="m-pills"></div>
    <div>
      <div class="section-label">Description</div>
      <iframe id="m-frame" class="desc-frame" sandbox="allow-same-origin" title="Job description"></iframe>
    </div>
    <a id="m-link" class="modal-link" target="_blank" rel="noopener noreferrer">
      View original posting ↗
    </a>
  </div>
</dialog>

<script>
'use strict';

// ── State ───────────────────────────────────────────────────────────────────

let BASE = localStorage.getItem('kal_base') || 'http://localhost:3000';

const $ = id => document.getElementById(id);
const baseInput  = $('base-url');
const connectBtn = $('connect-btn');
const searchBtn  = $('search-btn');
const clearBtn   = $('clear-btn');
const statusDot  = $('status-dot');
const statPills  = $('stat-pills');
const mainEl     = $('main');
const modal      = $('job-modal');

baseInput.value = BASE;

// ── Connect ──────────────────────────────────────────────────────────────────

async function connect() {
  BASE = baseInput.value.trim().replace(/\/$/, '');
  localStorage.setItem('kal_base', BASE);
  setStatus('');
  statPills.innerHTML = '';
  try {
    const stats = await apiFetch('/stats');
    setStatus('ok');
    const platforms = Object.entries(stats.byPlatform || {});
    statPills.innerHTML =
      `<span><strong>${(stats.totalJobs || 0).toLocaleString()}</strong> jobs</span>` +
      `<span><strong>${platforms.length}</strong> platform${platforms.length !== 1 ? 's' : ''}</span>` +
      (stats.salaryNullRate < 1
        ? `<span><strong>${((1 - stats.salaryNullRate) * 100).toFixed(0)}%</strong> with salary</span>`
        : '');

    const sel = $('q-platform');
    while (sel.options.length > 1) sel.remove(1);
    platforms.sort((a, b) => b[1] - a[1]).forEach(([id, n]) => {
      const o = document.createElement('option');
      o.value = id;
      o.textContent = `${id} (${n})`;
      sel.appendChild(o);
    });

    doSearch();
  } catch (err) {
    setStatus('err', err.message);
    mainEl.innerHTML = `<div class="empty">Could not connect — ${esc(err.message)}</div>`;
  }
}

function setStatus(state, msg = '') {
  statusDot.className = 'status-dot' + (state ? ` ${state}` : '');
  statusDot.title = state === 'ok' ? 'Connected'
                  : state === 'err' ? `Error: ${msg}`
                  : 'Disconnected';
}

// ── Search ───────────────────────────────────────────────────────────────────

async function doSearch() {
  const text       = $('q-text').value.trim();
  const platformId = $('q-platform').value;
  const limit      = Math.max(1, Math.min(1000, Number($('q-limit').value) || 50));

  mainEl.innerHTML = '<div class="empty">Loading…</div>';
  searchBtn.disabled = true;

  try {
    let items; // IndexedJob[]

    if (text) {
      const body = { text, limit };
      if (platformId) body.platformId = platformId;
      const hits = await apiFetch('/search', { method: 'POST', body: JSON.stringify(body) });
      // /search returns { contentHash, score, indexed: IndexedJob | undefined }
      items = hits.map(h => h.indexed).filter(Boolean);
    } else {
      const params = new URLSearchParams({ limit: String(limit) });
      let all = await apiFetch(`/jobs?${params}`);
      if (platformId) all = all.filter(i => i.job && i.job.platformId === platformId);
      items = all;
    }

    renderResults(items);
  } catch (err) {
    mainEl.innerHTML = `<div class="empty">Error: ${esc(err.message)}</div>`;
  } finally {
    searchBtn.disabled = false;
  }
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(BASE + path, {
    headers: { 'content-type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ── Render cards ─────────────────────────────────────────────────────────────

function renderResults(items) {
  if (!items.length) {
    mainEl.innerHTML = '<div class="empty">No results.</div>';
    return;
  }
  const hdr = document.createElement('div');
  hdr.className = 'results-header';
  hdr.textContent = `${items.length.toLocaleString()} result${items.length === 1 ? '' : 's'}`;

  const grid = document.createElement('div');
  grid.className = 'cards';
  items.forEach(item => grid.appendChild(makeCard(item)));

  mainEl.innerHTML = '';
  mainEl.appendChild(hdr);
  mainEl.appendChild(grid);
}

function makeCard({ job, enrichment }) {
  const el = document.createElement('div');
  el.className = 'card';
  el.setAttribute('role', 'button');
  el.tabIndex = 0;

  const salary    = fmtSalary(enrichment);
  const seniority = enrichment?.seniority?.value;
  const skills    = (enrichment?.skills || []).slice(0, 5);
  const yoe       = enrichment?.yoe?.value;

  el.innerHTML = `
    <div class="card-top">
      <div class="card-title">${esc(job.title)}</div>
      <span class="platform-badge">${esc(job.platformId)}</span>
    </div>
    <div class="card-meta">
      <span>${esc(job.company)}</span>
      ${job.location ? `<span class="sep">·</span><span>${esc(job.location)}</span>` : ''}
      ${salary       ? `<span class="sep">·</span><span class="salary">${salary}</span>` : ''}
      ${yoe != null  ? `<span class="sep">·</span><span>${yoe}+ yoe</span>` : ''}
    </div>
    <div class="pills">
      ${seniority ? `<span class="pill s-${seniority}">${seniority}</span>` : ''}
      ${skills.map(s => `<span class="pill p-skill">${esc(s.label)}</span>`).join('')}
    </div>`;

  const open = () => openModal({ job, enrichment });
  el.addEventListener('click', open);
  el.addEventListener('keydown', e => (e.key === 'Enter' || e.key === ' ') && open());
  return el;
}

// ── Salary formatting ─────────────────────────────────────────────────────────

function fmtSalary(enr) {
  const s = enr?.salary?.value;
  if (!s || (!s.min && !s.max)) return null;
  const cur    = s.currency || '';
  const period = s.period ? `/${s.period[0]}` : '';
  const k      = n => n ? `${cur}${Math.round(n / 1000)}k` : '?';
  if (s.min && s.max) return `${k(s.min)}–${k(s.max)}${period}`;
  if (s.min)          return `${k(s.min)}+${period}`;
  return `up to ${k(s.max)}${period}`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal({ job, enrichment }) {
  $('m-title').textContent   = job.title;
  $('m-company').textContent = [job.company, job.location].filter(Boolean).join(' · ');

  const salary    = fmtSalary(enrichment);
  const seniority = enrichment?.seniority?.value;
  const skills    = enrichment?.skills || [];
  const yoe       = enrichment?.yoe?.value;
  const scraped   = job.scrapedAt ? new Date(job.scrapedAt).toLocaleDateString() : null;

  $('m-meta').innerHTML = [
    `<span>${esc(job.platformId)}</span>`,
    salary              ? `<span class="salary">${salary}</span>` : null,
    yoe != null         ? `<span>${yoe}+ yoe</span>` : null,
    job.postedAt        ? `<span>Posted ${esc(job.postedAt)}</span>` : null,
    scraped             ? `<span>Scraped ${scraped}</span>` : null,
  ].filter(Boolean).join('<span class="sep">·</span>');

  $('m-pills').innerHTML = [
    seniority ? `<span class="pill s-${seniority}">${seniority}</span>` : '',
    ...skills.map(s => `<span class="pill p-skill">${esc(s.label)}</span>`),
  ].join('');

  // Render description in a sandboxed iframe so scraped HTML is isolated.
  const frame = $('m-frame');
  const desc  = job.description || '';
  const doc   = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><style>
    body { margin: 12px 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
           font-size: 13px; line-height: 1.6; color: #e6edf3; background: #21262d; word-break: break-word; }
    a { color: #58a6ff; } img { max-width: 100%; }
    * { box-sizing: border-box; }
  </style></head><body>${desc}</body></html>`);
  doc.close();
  // Auto-resize frame to content height
  requestAnimationFrame(() => {
    try { frame.style.height = doc.body.scrollHeight + 28 + 'px'; } catch {}
  });

  $('m-link').href = job.url;
  modal.showModal();
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Events ────────────────────────────────────────────────────────────────────

connectBtn.addEventListener('click', connect);
searchBtn.addEventListener('click', doSearch);
clearBtn.addEventListener('click', () => {
  $('q-text').value = '';
  $('q-platform').value = '';
  $('q-limit').value = '50';
  doSearch();
});

$('q-text').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

$('modal-close').addEventListener('click', () => modal.close());
modal.addEventListener('click', e => { if (e.target === modal) modal.close(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.open) modal.close(); });

// Auto-connect if a URL was previously saved
if (localStorage.getItem('kal_base')) connect();
</script>
</body>
</html>
